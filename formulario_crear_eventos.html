<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crear evento</title>
  <link rel="stylesheet" href="formulario_crear_evento.css" />
</head>

<body>
  <div id="contenedor">

    <header id="cabecera_superior">
      <img class="logo" src="logo sin fondo.png" alt="logo">
      <h1>El Hilo Rojo</h1>
    </header>

    <div id="franja_roja"></div>

    <main id="cuerpo">

      <div class="colizq">
        <h3 class="titulofotos">Fotografías subidas</h3>

        <div class="imagenplaceholder"></div>

        <button type="button" class="btnfotos">Agregar fotos</button>
      </div>

      <div class="colder">
        <label for="nombre_evento">NOMBRE EVENTO</label>
        <input type="text" id="nombre_evento" name="nombre_evento" />

        <label for="descripcion">DESCRIPCIÓN</label>
        <textarea id="descripcion" name="descripcion"></textarea>

        <label for="ciudad">CIUDAD</label>
        <input type="text" id="ciudad" name="ciudad" />

        <label for="fecha">FECHA</label>
        <input type="text" id="fecha" name="fecha" />

        <button type="button" class="btnguardar">GUARDAR</button>
      </div>

    </main>

  </div>
</body>

</html>
