<!DOCTYPE html>
<html lang="es"> <!-- "es" si la web está en español -->

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Registro El Hilo Rojo</title>
    <link rel="stylesheet" href="formulario_registro.css" /> <!-- ENLAZAMOS CON EL CSS DEL FORMULARIO -->
</head>

<body>
    <div id="contenedor">

        <div id="cabecera_superior"> <!-- cabecera superior con titulo y logo -->
            <div class="cojunto_cabezera">
                <img src="logo sin fondo.png" alt="logo">
                <h1>EL HILO ROJO</h1>
            </div>
        </div>
        <section class="formulario"> <!-- contenido con formulario -->
            <div id=cabecera_titulo> <!-- cabecera con titulo del apartado -->
                <h2> REGISTRARSE </h2>
            </div>
            <form action="accio.php" autocomplete="on" method="get">

                <div class="form-grid">

                    <div class="col">
                        <!-- forms nombre -->
                        <label for="nombre">CIF:</label>
                        <input type="text" name="nombre" id="nombre" required pattern="[A-Za-z]{3,}" placeholder=""
                            title="Debe tener al menos 3 caracteres y solo letras" /> <!-- si son letras y minimo 3 -->

                        <!-- forms email -->
                        <label for="email">Email:</label>
                        <input type="email" name="email" id="email" required placeholder="ejemplo@correo.com"
                            title="Debe tener un formato valido" /><!-- placeholder nos sirve para que se vea en gris el ejemplo -->


                        <!-- forms pasword -->
                        <label for="password">Escribe tu contraseña:</label>
                        <input type="password" name="password" id="password" required
                            pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}$" placeholder=""
                            title=" Minimo 8 caracteres, debe incluir numeros, mayusculas y minusculas" />

                        <!-- forms repetir pasword -->
                        <label for="passwordRepeat">Repite tu contraseña:</label>
                        <input type="password" name="passwordRepeat" id="passwordRepeat" required
                            pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}$" placeholder=""
                            title=" Minimo 8 caracteres, debe incluir numeros, mayusculas y minusculas" />

                        <!-- forms Empresa -->
                        <label for="empresa">Nombre de tu empresa:</label>
                        <input type="empresa" name="empresa" id="empresa" required />


                        <!-- forms Ciudad -->
                        <label for="ciudad">Ciudad:</label>
                        <select id="ciudad" name="ciudad" type="ciudad" required>   
                            <option value="">Selecciona una ciudad</option>
                            <option value="barcelona">Barcelona</option>
                            <option value="madrid">Madrid</option>
                            <option value="valencia">Valencia</option>
                            <option value="sevilla">Sevilla</option>
                        </select>

                        

                        <!-- BOTÓN SUBMIT -->
                        <button type="submit" class="btn-submit">
                            REGISTRARSE
                        </button>
                </div>
            </form>
        </section>

    </div>
</body>

</html>
